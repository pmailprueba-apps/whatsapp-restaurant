services:
  - type: web
    name: whatsapp-restaurant
    runtime: python
    buildCommand: pip install -r requirements-prod.txt
    startCommand: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: whatsapp-db
          property: connectionString
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: OWNER_PHONE
        sync: false

databases:
  - name: whatsapp-db
    databaseName: restaurant
    plan: free
